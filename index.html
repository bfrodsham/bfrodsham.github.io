<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bfrodsham.github.io</title>
  <meta name="description" content="Portfolio and demo site for bfrodsham.github.io" />
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      min-height: 100vh;
    }

    * {
      box-sizing: border-box;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 900px;
      width: 100%;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.35);
    }

    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2.5rem, 5vw, 4rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    p {
      line-height: 1.75;
      color: #cbd5e1;
      margin: 0 0 1.4rem;
    }

    .tagline {
      color: #7dd3fc;
      font-weight: 600;
      margin-bottom: 1.6rem;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
      border-bottom: 1px solid rgba(56, 189, 248, 0.35);
    }

    footer {
      margin-top: 2rem;
      color: #94a3b8;
      font-size: 0.95rem;
    }

    textarea {
      width: 100%;
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.32);
      background: rgba(15, 23, 42, 0.85);
      color: #e2e8f0;
      padding: 1rem;
      font: inherit;
      resize: vertical;
      min-height: 170px;
      margin-top: 0.75rem;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #cbd5e1;
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    button {
      border: none;
      background: #38bdf8;
      color: #0f172a;
      border-radius: 999px;
      padding: 0.85rem 1.25rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: #22d3ee;
    }

    .meta span {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(56, 189, 248, 0.12);
      border: 1px solid rgba(56, 189, 248, 0.18);
      border-radius: 999px;
      padding: 0.55rem 0.95rem;
      font-size: 0.95rem;
      color: #bae6fd;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Hi, I'm Benjamin Frodsham</h1>
    <p class="tagline">Type a question about me below and press submit. Your input is limited to 300 characters.</p>
    <form onsubmit="return false;">
      <label for="resume-prompt">Your question</label>
      <textarea id="resume-prompt" name="resume-prompt" rows="6" maxlength="300" placeholder="Ask about my experience, skills, or background..." required></textarea>
      <div class="meta">
        <span>Max 300 characters</span>
        <button type="submit">Submit</button>
      </div>
    </form>
    <footer>
      This field is for prompt input only; submission does not perform any action.
    </footer>
  </main>
</body>
</html>
